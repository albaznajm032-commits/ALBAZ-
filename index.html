:root{--bg-deep:#06060c;--bg-secondary:#0f0f1c;--bg-card:rgba(16,16,32,0.65);--neon-purple:#a855f7;--neon-purple-dim:#7c3aed;--neon-purple-glow:rgba(168,85,247,0.4);--neon-blue:#06b6d4;--neon-pink:#ec4899;--text-primary:#ededf5;--text-secondary:#8585a8;--text-muted:#4e4e70;--glass-border:rgba(168,85,247,0.12);--glass-border-hover:rgba(168,85,247,0.3);--danger:#ef4444;--success:#22c55e;--bottom-nav-h:68px}

const cv=document.getElementById('particles-canvas'),cx=cv.getContext('2d');let ps=[];
function rc(){cv.width=innerWidth;cv.height=innerHeight}rc();addEventListener('resize',rc);
class Pt{constructor(){this.x=Math.random()*cv.width;this.y=Math.random()*cv.height;this.vx=(Math.random()-.5)*.3;this.vy=(Math.random()-.5)*.3;this.r=Math.random()*1.8+.4;this.c=Math.random()>.5?'168,85,247':'6,182,212';this.a=Math.random()*.35+.15}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>cv.width)this.vx*=-1;if(this.y<0||this.y>cv.height)this.vy*=-1}draw(){cx.beginPath();cx.arc(this.x,this.y,Math.max(.4,this.r),0,Math.PI*2);cx.fillStyle=`rgba(${this.c},${this.a})`;cx.fill()}}
for(let i=0;i<35;i++)ps.push(new Pt());
function aP(){cx.clearRect(0,0,cv.width,cv.height);for(let i=0;i<ps.length;i++){ps[i].update();ps[i].draw();for(let j=i+1;j<ps.length;j++){const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<100){cx.beginPath();cx.moveTo(ps[i].x,ps[i].y);cx.lineTo(ps[j].x,ps[j].y);cx.strokeStyle=`rgba(168,85,247,${(1-d/100)*.08})`;cx.lineWidth=.4;cx.stroke()}}}requestAnimationFrame(aP)}aP();
function gCI(a,b){return[a,b].sort().join('_')}

async function handleAuth(){const e=document.getElementById('aEmail').value.trim(),p=document.getElementById('aPass').value,n=document.getElementById('aName').value.trim(),b=document.getElementById('aBtn'),er=document.getElementById('aErr');if(!e||!p){er.textContent='أدخل البريد وكلمة المرور';return}if(p.length<6){er.textContent='كلمة المرور 6 أحرف';return}if(aMode==='reg'&&!n){er.textContent='أدخل الاسم';return}b.disabled=true;document.getElementById('aBtnT').innerHTML='<span class="auth-spinner"></span>';er.textContent='';try{if(aMode==='reg'){const c=await auth.createUserWithEmailAndPassword(e,p);await db.collection('users').doc(c.user.uid).set({displayName:n,email:e,bio:'مرحباً في ألباز!',photoURL:null,createdAt:firebase.firestore.FieldValue.serverTimestamp()})}else{await auth.signInWithEmailAndPassword(e,p)}}catch(x){const m={'auth/email-already-in-use':'البريد مسجل — سجّل دخولك','auth/invalid-credential':'البريد أو كلمة المرور غير صحيحة','auth/too-many-requests':'محاولات كثيرة — انتظر','auth/user-not-found':'لا يوجد حساب بهذا البريد','auth/weak-password':'كلمة المرور ضعيفة'};er.textContent=m[x.code]||'خطأ: '+x.message}b.disabled=false;document.getElementById('aBtnT').textContent=aMode==='login'?'تسجيل الدخول':'إنشاء حساب'}

function rFeed(s,c){c.innerHTML='';if(s.empty){c.innerHTML='<div class="empty"><i class="fas fa-pen-fancy"></i>لا توجد منشورات بعد</div>';return}s.forEach(d=>{const p=d.data();p.id=d.id;mkPost(p,c)});setTimeout(obs,50)}
function setFM(m){fm=m;document.querySelectorAll('.ft-btn').forEach(b=>{b.classList.toggle('active',b.dataset.m===m)});loadFeed()}
function mkPost(p,c){const el=document.createElement('article');el.className='post-card';el.id='p-'+p.id;const nm=p.userName||'مستخدم',ini=nm.charAt(0),isL=p.likes&&p.likes.includes(CU.uid),lc=p.likes?p.likes.length:0;const tm=p.createdAt?tAgo(p.createdAt.toDate()):'الآن';const img=p.imageURL?`<img class="p-img" src="${p.imageURL}" loading="lazy" onerror="this.style.display='none'">`:'';let ct=(p.content||'').replace(/#(\S+)/g,'<span class="hashtag">#$1</span>').replace(/@(\S+)/g,'<span class="mention">@$1</span>').replace(/\n/g,'<br>');const del=p.userId===CU.uid?`<button class="p-more" onclick="delP('${p.id}')"><i class="fas fa-trash"></i></button>`:'<div style="width:32px"></div>';el.innerHTML=`<div class="post-header">${avH(p.userPhotoURL,ini,42,`viewU('${p.userId}')`)}<div class="pu-info"><div class="pu-name" onclick="viewU('${p.userId}')">${nm}</div><div class="pu-meta">${tm}</div></div>${del}</div><div class="p-body"><p class="p-text">${ct}</p></div>${img}<div class="p-stats"><span><i class="fas fa-heart" style="color:var(--neon-pink);font-size:10px;"></i> <span class="lc-${p.id}">${lc}</span></span><span><i class="fas fa-comment" style="font-size:10px;"></i> <span class="cc-${p.id}">${p.commentCount||0}</span></span><span><i class="fas fa-share" style="font-size:10px;"></i> ${p.shareCount||0}</span></div><div class="p-actions"><button class="pa-btn ${isL?'liked':''}" onclick="togLike('${p.id}',this)"><i class="fas fa-heart"></i></button><button class="pa-btn" onclick="togCmt('${p.id}')"><i class="fas fa-comment"></i></button><button class="pa-btn" onclick="shrP('${p.id}')"><i class="fas fa-share"></i></button><button class="pa-btn ba-${p.id}" onclick="bmP('${p.id}',this)"><i class="fas fa-bookmark"></i></button></div><div class="cmt-sec" id="cs-${p.id}"><div class="cmt-list" id="cl-${p.id}"></div><div class="cmt-input-wrap"><input class="cmt-input" type="text" placeholder="تعليق..." onkeydown="if(event.key==='Enter')addCmt('${p.id}',this)"><button class="cmt-send" onclick="addCmt('${p.id}',this.previousElementSibling)"><i class="fas fa-paper-plane"></i></button></div></div>`;c.appendChild(el);ldCmt(p.id);chkBm(p.id)}
function ldCmt(pid){db.collection('posts').doc(pid).collection('comments').orderBy('createdAt','asc').get().then(s=>{const l=document.getElementById('cl-'+pid);if(!l)return;l.innerHTML='';s.forEach(d=>{const c=d.data(),i=(c.userName||'م').charAt(0);const e=document.createElement('div');e.className='cmt-item';e.innerHTML=`${avH(c.userPhotoURL,i,28)}<div class="cmt-content"><div class="cmt-name" onclick="viewU('${c.userId}')">${c.userName||'مستخدم'}</div><div class="cmt-text">${c.text}</div></div>`;l.appendChild(e)})})}
async function togLike(pid,btn){const r=db.collection('posts').doc(pid),d=await r.get();if(!d.exists)return;let lk=d.data().likes||[];if(lk.includes(CU.uid)){lk=lk.filter(u=>u!==CU.uid);btn.classList.remove('liked')}else{lk.push(CU.uid);btn.classList.add('liked');burst(btn);if(d.data().userId!==CU.uid)addN(d.data().userId,CD.displayName,'أعجب بمنشورك')}await r.update({likes});const e=document.querySelector('.lc-'+pid);if(e)e.textContent=lk.length}
async function addCmt(pid,inp){const t=inp.value.trim();if(!t)return;await db.collection('posts').doc(pid).collection('comments').add({userId:CU.uid,userName:CD.displayName,userPhotoURL:CD.photoURL||null,text:t,createdAt:firebase.firestore.FieldValue.serverTimestamp()});const r=db.collection('posts').doc(pid);await db.runTransaction(async tx=>{const d=await tx.get(r);tx.update(r,{commentCount:(d.data().commentCount||0)+1})});const e=document.querySelector('.cc-'+pid);if(e)e.textContent=parseInt(e.textContent)+1;inp.value='';ldCmt(pid);const pd=await r.get();if(pd.exists&&pd.data().userId!==CU.uid)addN(pd.data().userId,CD.displayName,'علّق على منشورك');toast('تم التعليق')}

function burst(btn){const r=btn.getBoundingClientRect();for(let i=0;i<6;i++){const p=document.createElement('div');p.className='like-p';const a=(Math.PI*2/6)*i,d=20+Math.random()*12;p.style.setProperty('--tx',Math.cos(a)*d+'px');p.style.setProperty('--ty',Math.sin(a)*d+'px');p.style.left=r.left+r.width/2+'px';p.style.top=r.top+r.height/2+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),500)}}
document.getElementById('imgInput').addEventListener('change',function(e){const f=e.target.files[0];if(!f)return;if(f.size>5*1024*1024){toast('حجم أقل من 5 ميغا');return}upFile=f;const r=new FileReader();r.onload=ev=>{document.getElementById('uPrevImg').src=ev.target.result;document.getElementById('uPrev').style.display='block'};r.readAsDataURL(f);this.value=''});

async function upImg(f){const p=`posts/${CU.uid}/${Date.now()}_${f.name}`,ref=stRef.child(p),pr=document.getElementById('uProg'),br=document.getElementById('uBar');pr.style.display='block';br.style.width='0%';const t=ref.put(f);return new Promise((res,rej)=>{t.on('state_changed',s=>{br.style.width=(s.bytesTransferred/s.totalBytes*100)+'%'},e=>rej(e),async()=>{try{const u=await t.snapshot.ref.getDownloadURL();pr.style.display='none';res(u)}catch(e){rej(e)}})})}

async function getFS(uid){if(uid===CU.uid)return'me';const f=await db.collection('users').doc(CU.uid).collection('friends').doc(uid).get();if(f.exists)return'friends';const o=await db.collection('users').doc(CU.uid).collection('outReq').doc(uid).get();if(o.exists)return'sent';const inc=await db.collection('users').doc(CU.uid).collection('inReq').doc(uid).get();if(inc.exists)return'received';return'none'}

async function decFR(uid){await db.collection('users').doc(CU.uid).collection('inReq').doc(uid).delete();await db.collection('users').doc(uid).collection('outReq').doc(CU.uid).delete();toast('تم الرفض');ldNotif();if(vUid===uid)viewU(uid)}
async function rmFr(uid){if(!confirm('إزالة الصديق؟'))return;await db.collection('users').doc(CU.uid).collection('friends').doc(uid).delete();await db.collection('users').doc(uid).collection('friends').doc(CU.uid).delete();const ci=gCI(CU.uid,uid);await db.collection('users').doc(CU.uid).collection('chats').doc(ci).delete();await db.collection('users').doc(uid).collection('chats').doc(ci).delete();toast('تمت الإزالة');closeChat();if(vUid===uid)viewU(uid)}
async function viewU(uid){if(uid===CU.uid){goMy();return}vUid=uid;nav('profile');document.getElementById('pBack').classList.add('show');document.getElementById('pEditBtn').style.display='none';const doc=await db.collection('users').doc(uid).get();if(!doc.exists){toast('غير موجود');goMy();return}const u=doc.data(),i=(u.displayName||'م').charAt(0);document.getElementById('pAvWrap').innerHTML=avH(u.photoURL,i,100);document.getElementById('pName').textContent=u.displayName||'مستخدم';document.getElementById('pEmail').textContent=u.email;document.getElementById('pBio').textContent=u.bio||'لا توجد نبذة';document.getElementById('pBio').style.display='block';document.getElementById('pBioEdit').classList.remove('show');const ps=await db.collection('posts').where('userId','==',uid).get();document.getElementById('sP').textContent=ps.size;const fs=await db.collection('users').doc(uid).collection('followers').get();document.getElementById('sF').textContent=fs.size;const fg=await db.collection('users').doc(uid).collection('following').get();document.getElementById('sFg').textContent=fg.size;const fr=await db.collection('users').doc(uid).collection('friends').get();document.getElementById('sFr').textContent=fr.size;const st=await getFS(uid);const isF=fs.docs.some(d=>d.id===CU.uid);let a='';if(st==='friends')a=`<button class="btn-fr friends"><i class="fas fa-user-check" style="margin-left:5px;"></i>أصدقاء</button><button class="btn-unfr show" onclick="rmFr('${uid}')"><i class="fas fa-user-minus" style="margin-left:3px;"></i>إزالة</button><button class="btn-fl ${isF?'following':''}" onclick="togFl('${uid}')" style="font-size:12px;padding:9px 16px">${isF?'متابَع':'متابعة'}</button>`;else if(st==='sent')a=`<button class="btn-fr pending"><i class="fas fa-clock" style="margin-left:5px;"></i>طلُبت</button><button class="btn-fl ${isF?'following':''}" onclick="togFl('${uid}')" style="font-size:12px;padding:9px 16px">${isF?'متابَع':'متابعة'}</button>`;else if(st==='received')a=`<button class="btn-fr received" onclick="accFR('${uid}')"><i class="fas fa-check" style="margin-left:5px;"></i>قبول</button><button class="btn-unfr show" onclick="decFR('${uid}')" style="background:rgba(255,255,255,0.04);border-color:var(--glass-border);color:var(--text-muted)"><i class="fas fa-xmark" style="margin-left:3px;"></i>رفض</button><button class="btn-fl ${isF?'following':''}" onclick="togFl('${uid}')" style="font-size:12px;padding:9px 16px">${isF?'متابَع':'متابعة'}</button>`;else a=`<button class="btn-fr" onclick="sendFR('${uid}')"><i class="fas fa-user-plus" style="margin-left:5px;"></i>طلب صداقة</button><button class="btn-fl ${isF?'following':''}" onclick="togFl('${uid}')" style="font-size:12px;padding:9px 16px">${isF?'متابَع':'متابعة'}</button>`;document.getElementById('pActs').innerHTML=a;setPT('posts');const pc=document.getElementById('pPosts');pc.innerHTML='';if(ps.empty){pc.innerHTML='<div class="empty"><i class="fas fa-pen-fancy"></i>لا منشورات</div>';return}ps.forEach(d=>{const p=d.data();p.id=d.id;mkPost(p,pc)});setTimeout(obs,50)}
function goMy(){vUid=null;nav('profile');document.getElementById('pBack').classList.remove('show');ldMy()}
async function ldMy(){vUid=null;document.getElementById('pBack').classList.remove('show');document.getElementById('pEditBtn').style.display='flex';const n=CD.displayName||'مستخدم',i=n.charAt(0);document.getElementById('pAvWrap').innerHTML=avH(CD.photoURL,i,100);document.getElementById('pName').textContent=n;document.getElementById('pEmail').textContent=CU.email;document.getElementById('pBio').textContent=CD.bio||'مرحباً في ألباز!';document.getElementById('pBio').style.display='block';document.getElementById('pBioEdit').classList.remove('show');const ps=await db.collection('posts').where('userId','==',CU.uid).get();document.getElementById('sP').textContent=ps.size;const fs=await db.collection('users').doc(CU.uid).collection('followers').get();document.getElementById('sF').textContent=fs.size;const fg=await db.collection('users').doc(CU.uid).collection('following').get();document.getElementById('sFg').textContent=fg.size;const fr=await db.collection('users').doc(CU.uid).collection('friends').get();document.getElementById('sFr').textContent=fr.size;document.getElementById('pActs').innerHTML=`<button class="btn-edt" onclick="togBE()"><i class="fas fa-pen" style="margin-left:5px;"></i>تعديل النبذة</button><button class="btn-sav" id="bioSav" onclick="savBio()">حفظ</button>`;setPT('posts')}
function togBE(){const b=document.getElementById('pBio'),e=document.getElementById('pBioEdit'),s=document.getElementById('bioSav');if(e.classList.contains('show')){e.classList.remove('show');b.style.display='block';s.classList.remove('show')}else{e.value=CD.bio||'';b.style.display='none';e.classList.add('show');s.classList.add('show');e.focus()}}
async function savBio(){const v=document.getElementById('pBioEdit').value.trim();await db.collection('users').doc(CU.uid).update({bio:v});CD.bio=v;document.getElementById('pBio').textContent=v||'مرحباً!';togBE();toast('تم الحفظ')}
async function togFl(uid){const mr=db.collection('users').doc(CU.uid).collection('following').doc(uid),tr=db.collection('users').doc(uid).collection('followers').doc(CU.uid);const d=await mr.get(),isF=d.exists,btn=event.target.closest('.btn-fl');if(isF){await mr.delete();await tr.delete();if(btn){btn.textContent='متابعة';btn.classList.remove('following')}toast('تم إلغاء المتابعة')}else{await mr.set({f:firebase.firestore.FieldValue.serverTimestamp()});await tr.set({f:firebase.firestore.FieldValue.serverTimestamp()});if(btn){btn.textContent='متابَع';btn.classList.add('following')}addN(uid,CD.displayName,'بدأ بمتابعتك');toast('تمت المتابعة')}if(vUid===uid){const fs=await db.collection('users').doc(uid).collection('followers').get();document.getElementById('sF').textContent=fs.size}}
function setPT(t){document.querySelectorAll('.ptab').forEach(b=>{b.classList.toggle('active',b.dataset.t===t)});document.getElementById('pt-posts').style.display=t==='posts'?'block':'none';document.getElementById('pt-bm').style.display=t==='bm'?'block':'none';if(t==='posts'){if(vUid)viewU(vUid);else ldMyPosts()}else if(t==='bm'&&!vUid)ldBm(document.getElementById('pBm'))}
async function ldMyPosts(){const c=document.getElementById('pPosts');c.innerHTML='';const s=await db.collection('posts').where('userId','==',CU.uid).orderBy('createdAt','desc').get();if(s.empty){c.innerHTML='<div class="empty"><i class="fas fa-pen-fancy"></i>لم تنشر شيئاً</div>';return}s.forEach(d=>{const p=d.data();p.id=d.id;mkPost(p,c)});setTimeout(obs,50)}
async function ldBm(c){const s=await db.collection('users').doc(CU.uid).collection('bookmarks').get();c.innerHTML='';if(s.empty){c.innerHTML='<div class="empty"><i class="fas fa-bookmark"></i>لا محفوظات</div>';return}for(const bd of s.docs){const pd=await db.collection('posts').doc(bd.id).get();if(pd.exists){const p=pd.data();p.id=pd.id;mkPost(p,c)}}setTimeout(obs,50)}
async function ldNotif(){if(!CU)return;const c=document.getElementById('notifList');const s=await db.collection('users').doc(CU.uid).collection('notifications').orderBy('createdAt','desc').limit(20).get();c.innerHTML='';if(s.empty){c.innerHTML='<div class="empty"><i class="fas fa-bell-slash"></i>لا إشعارات</div>';return}s.forEach(d=>{const n=d.data(),i=(n.fromName||'م').charAt(0),t=n.createdAt?tAgo(n.createdAt.toDate()):'الآن';const el=document.createElement('div');el.className='notif'+(n.read?'':' unread');let acts='';if(n.type==='fr'&&n.fromUid)acts=`<div class="notif-acts"><button class="na-acc" onclick="event.stopPropagation();accFR('${n.fromUid}')">قبول</button><button class="na-dec" onclick="event.stopPropagation();decFR('${n.fromUid}')">رفض</button></div>`;el.innerHTML=`<div class="n-av" ${n.fromUid?`onclick="event.stopPropagation();viewU('${n.fromUid}')"`:''}>${i}</div><div class="n-cont"><div class="n-txt"><strong ${n.fromUid?`onclick="event.stopPropagation();viewU('${n.fromUid}')"`:''}>${n.fromName}</strong> ${n.action}</div><div class="n-time">${t}</div>${acts}</div>`;el.onclick=async()=>{if(!n.read)await d.ref.update({read:true});el.classList.remove('unread')};c.appendChild(el)})}
async function ldChatList(){const c=document.getElementById('chatList');c.innerHTML='';const s=await db.collection('users').doc(CU.uid).collection('chats').orderBy('la','desc').get();if(s.empty){c.innerHTML='<div class="empty"><i class="fas fa-comment-dots"></i>لا محادثات<br><span style="font-size:11px">أضف أصدقاء لبدء المحادثة</span></div>';return}s.forEach(d=>{const ch=d.data(),i=(ch.on||'م').charAt(0),t=ch.la?tAgo(ch.la.toDate()):'';const el=document.createElement('div');el.className='chat-item';el.onclick=()=>openChat(ch.ou);el.innerHTML=`${avH(ch.op,i,44)}<div class="ci-info"><div class="ci-name">${ch.on||'مستخدم'}</div><div class="ci-preview">${ch.lm||'ابدأ المحادثة...'}</div></div><div style="flex-shrink:0"><div class="ci-time">${t}</div>${ch.uc>0?`<div class="ci-unread">${ch.uc}</div>`:''}</div>`;c.appendChild(el)})}
async function openChat(ou){chatUid=ou;chatId=gCI(CU.uid,ou);const cd=await db.collection('users').doc(CU.uid).collection('chats').doc(chatId).get();chatDoc=cd.exists?cd.data():{on:'مستخدم',op:null};const i=(chatDoc.on||'م').charAt(0);document.getElementById('cdAv').textContent=i;document.getElementById('cdAv').style.cssText='width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--neon-purple-dim),var(--neon-blue));color:#fff;flex-shrink:0';document.getElementById('cdName').textContent=chatDoc.on||'مستخدم';document.getElementById('chatDet').classList.add('show');document.getElementById('cdInp').value='';setTimeout(()=>document.getElementById('cdInp').focus(),100);await db.collection('users').doc(CU.uid).collection('chats').doc(chatId).update({uc:0});if(chatL)chatL();chatL=db.collection('chats').doc(chatId).collection('messages').orderBy('createdAt','asc').onSnapshot(s=>{const c=document.getElementById('cdMsgs');c.innerHTML='';if(s.empty){c.innerHTML='<div class="empty" style="padding:30px"><i class="fas fa-comments"></i>ابدأ المحادثة</div>';return}s.forEach(d=>{const m=d.data(),isS=m.senderId===CU.uid;const el=document.createElement('div');el.className='msg '+(isS?'msg-s':'msg-r');el.innerHTML=`<div class="msg-t">${m.text}</div><div class="msg-tm">${m.createdAt?tAgo(m.createdAt.toDate()):'الآن'}</div>`;c.appendChild(el)});c.scrollTop=c.scrollHeight})}
function closeChat(){document.getElementById('chatDet').classList.remove('show');if(chatL){chatL();chatL=null}chatUid=null;chatId=null;ldChatList()}
async function sendMsg(){const t=document.getElementById('cdInp').value.trim();if(!t||!chatId)return;document.getElementById('cdInp').value='';await db.collection('chats').doc(chatId).collection('messages').add({senderId:CU.uid,senderName:CD.displayName,text:t,createdAt:firebase.firestore.FieldValue.serverTimestamp()});const now=firebase.firestore.FieldValue.serverTimestamp();await db.collection('users').doc(CU.uid).collection('chats').doc(chatId).update({lm:t,la:now,uc:0});await db.collection('users').doc(chatUid).collection('chats').doc(chatId).update({lm:t,la:now,uc:firebase.firestore.FieldValue.increment(1)});addN(chatUid,CD.displayName,'أرسل لك رسالة','msg')}
function viewFromChat(){if(chatUid){closeChat();viewU(chatUid)}}
function nav(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('pg-'+p).classList.add('active');document.querySelectorAll('.bottom-nav-item').forEach(b=>{b.classList.toggle('active',b.dataset.p===p)});scrollTo({top:0,behavior:'smooth'});if(p==='bm')ldBm(document.getElementById('bmPosts'));if(p==='notif')ldNotif();if(p==='msg')ldChatList();if(p==='profile'&&!vUid)ldMy();setTimeout(obs,80)}
function togCmt(pid){const s=document.getElementById('cs-'+pid);if(s)s.classList.toggle('open')}
function openModal(){document.getElementById('cModal').classList.add('open');document.body.style.overflow='hidden';setTimeout(()=>document.getElementById('nText').focus(),200)}
function closeModal(){document.getElementById('cModal').classList.remove('open');document.body.style.overflow='';rmUp()}
document.getElementById('cModal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeChat()}});
function updCC(){const c=document.getElementById('nText').value.length;document.getElementById('charCt').textContent=c+'/500';document.getElementById('pubBtn').disabled=c===0&&!upFile;document.getElementById('charCt').style.color=c>450?'var(--danger)':'var(--text-muted)'}
let obsrv;function obs(){if(obsrv)obsrv.disconnect();obsrv=new IntersectionObserver(e=>{e.forEach((x,i)=>{if(x.isIntersecting){setTimeout(()=>x.target.classList.add('visible'),i*40);obsrv.unobserve(x.target)}})},{threshold:.05});document.querySelectorAll('.post-card:not(.visible)').forEach(c=>obsrv.observe(c))}
document.getElementById('aPass').addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth()});
</script>
</body>
